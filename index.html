<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox News — Tạp chí Phân tích Tài chính & Doanh nghiệp</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --paper: #f4f1ea;
            --ink: #111111;
            --gold: #aa8439;
            --border: #dcd7cc;
            --tag-ma: #b85042;
            --tag-dinhgia: #375e97;
            --tag-holding: #4f3793;
            --tag-thue: #3f6844;
            --tag-thitruong: #e06317;
            --tag-ipo: #026670;
            --tag-startup: #98dbc6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--paper); color: var(--ink); font-family: 'DM Sans', sans-serif; line-height: 1.6; }

        /* Header & Navigation */
        header { border-bottom: 4px double var(--ink); padding: 20px 0; text-align: center; background: var(--paper); }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 3rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--ink); text-decoration: none; }
        .nav-tabs { display: flex; justify-content: center; gap: 15px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 10px 0; margin-top: 20px; overflow-x: auto; white-space: nowrap; }
        .tab-btn { background: none; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; text-transform: uppercase; cursor: pointer; padding: 5px 10px; color: #555; transition: all 0.3s; }
        .tab-btn.active, .tab-btn:hover { color: var(--ink); font-weight: 700; border-bottom: 2px solid var(--ink); }

        /* Ticker Wrap */
        .ticker-wrap { background: var(--ink); color: #fff; padding: 10px 0; overflow: hidden; position: relative; }
        .ticker { display: flex; white-space: nowrap; animation: ticker 25s linear infinite; }
        .ticker:hover { animation-play-state: paused; }
        .ticker-item { padding: 0 30px; font-size: 0.85rem; text-transform: uppercase; font-weight: 500; cursor: pointer; }
        .ticker-item:hover { color: var(--gold); }
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-50%, 0, 0); } }

        /* Main Layout Grid */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .magazine-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 40px; margin-bottom: 40px; }
        
        /* Hero Big Post */
        .hero-post { cursor: pointer; border-right: 1px solid var(--border); padding-right: 40px; }
        .hero-post img { width: 100%; max-height: 400px; object-fit: cover; border: 1px solid var(--border); margin-bottom: 15px; }
        .hero-title { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 700; line-height: 1.1; margin-bottom: 15px; }
        .hero-excerpt { color: #444; font-size: 1.05rem; margin-bottom: 15px; }

        /* Top Side Posts */
        .side-posts { display: flex; flex-direction: column; gap: 25px; }
        .side-heading { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; border-bottom: 2px solid var(--ink); padding-bottom: 5px; margin-bottom: 15px; text-transform: uppercase; }
        .side-item { display: flex; gap: 15px; cursor: pointer; padding-bottom: 15px; border-bottom: 1px dashed var(--border); }
        .side-item img { width: 80px; height: 80px; object-fit: cover; border: 1px solid var(--border); }
        .side-item-title { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 700; line-height: 1.2; }

        /* Bottom Grid */
        .grid-heading { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 700; border-bottom: 2px solid var(--ink); padding-bottom: 5px; margin-top: 5px; margin-bottom: 25px; text-transform: uppercase; }
        .article-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        .grid-item { cursor: pointer; background: transparent; transition: transform 0.2s; }
        .grid-item:hover { transform: translateY(-3px); }
        .grid-item img { width: 100%; height: 200px; object-fit: cover; border: 1px solid var(--border); margin-bottom: 12px; }
        .grid-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 700; line-height: 1.2; margin-bottom: 8px; }
        .grid-excerpt { font-size: 0.9rem; color: #555; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        /* Badges & Meta */
        .badge { display: inline-block; padding: 2px 8px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #fff; border-radius: 2px; margin-bottom: 8px; }
        .badge-ma { background: var(--tag-ma); }
        .badge-dinh-gia { background: var(--tag-dinhgia); }
        .badge-holding { background: var(--tag-holding); }
        .badge-thue { background: var(--tag-thue); }
        .badge-thi-truong { background: var(--tag-thitruong); }
        .badge-ipo { background: var(--tag-ipo); }
        .badge-startup { background: var(--tag-startup); }
        .badge-case { background: var(--ink); }
        .meta-date { font-size: 0.75rem; color: #777; margin-bottom: 5px; text-transform: uppercase; }

        /* Modal View Base */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; overflow-y: auto; padding: 40px 20px; }
        .modal.active { display: block; }
        .modal-content { background: var(--paper); max-width: 800px; margin: 0 auto; padding: 40px; border: 1px solid var(--border); position: relative; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 2rem; cursor: pointer; color: #666; }
        .close-modal:hover { color: var(--ink); }
        .markdown-body { font-size: 1.1rem; line-height: 1.7; color: #222; margin-top: 20px; }
        .markdown-body h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; margin-top: 25px; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .markdown-body p { margin-bottom: 15px; text-align: justify; }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .magazine-layout { grid-template-columns: 1fr; gap: 30px; }
            .hero-post { border-right: none; padding-right: 0; }
            .article-grid { grid-template-columns: 1fr; }
            .modal-content { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo" onclick="changeCategory('all')">Sandbox News</a>
        <div class="nav-tabs">
            <button class="tab-btn active" id="tab-all" onclick="changeCategory('all')">Tất cả</button>
            <button class="tab-btn" id="tab-ma" onclick="changeCategory('ma')">M&A</button>
            <button class="tab-btn" id="tab-dinh-gia" onclick="changeCategory('dinh-gia')">Định giá</button>
            <button class="tab-btn" id="tab-holding" onclick="changeCategory('holding')">Holding</button>
            <button class="tab-btn" id="tab-thue" onclick="changeCategory('thue')">Thuế & Pháp lý</button>
            <button class="tab-btn" id="tab-thi-truong" onclick="changeCategory('thi-truong')">Thị trường</button>
            <button class="tab-btn" id="tab-ipo" onclick="changeCategory('ipo')">IPO</button>
            <button class="tab-btn" id="tab-startup" onclick="changeCategory('startup')">Startup</button>
            <button class="tab-btn" id="tab-case" onclick="changeCategory('case')">📚 Case Study</button>
        </div>
    </header>

    <div class="ticker-wrap">
        <div class="ticker" id="tickerWrap">
            <!-- Dòng chữ chạy được Render tự động qua JS -->
            <div class="ticker-item">Đang kết nối kho dữ liệu hệ thống Sandbox News...</div>
        </div>
    </div>

    <div class="container">
        <!-- Vùng hiển thị Trang chủ (Tin Nổi Bật + Đọc Nhiều) -->
        <div id="featuredSection" class="magazine-layout">
            <div id="heroPostContainer"></div>
            <div class="side-posts">
                <h3 class="side-heading">Đọc nhiều nhất</h3>
                <div id="sidePostsContainer"></div>
            </div>
        </div>

        <!-- Khung Lưới Tin Tức -->
        <h3 class="grid-heading" id="sectionTitle">Tin tức mới cập nhật</h3>
        <div class="article-grid" id="articleGrid"></div>
    </div>

    <!-- Cấu trúc Modal xem chi tiết bài viết -->
    <div id="articleModal" class="modal" onclick="if(event.target==this) closeModal()">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <span id="modalBadge" class="badge">TAG</span>
            <div id="modalDate" class="meta-date"></div>
            <h2 id="modalTitle" style="font-family: 'Cormorant Garamond', serif; font-size: 2.3rem; line-height: 1.2; margin-bottom: 20px;"></h2>
            <img id="modalImage" src="" alt="Article Image" style="width:100%; max-height:420px; object-fit:cover; margin-bottom:20px; border-radius:3px; display:none;">
            
            <!-- Nội dung bài viết + Link trích nguồn động -->
            <div id="modalContent" class="markdown-body"></div>
            
            <!-- Khung bình luận của AI-Agent tương tác -->
            <div id="modalComments"></div>
        </div>
    </div>

    <script>
        // Đường dẫn API Kết nối Google Sheets của bạn
        const SHEETS_API = "https://script.google.com/macros/s/AKfycbyj8N6UnyW4KzP0SGe_9yW-9_OOnF6g8T5632GZ_9X3t57406R9n_fHsk217i3Dof5R/exec";
        const PLACEHOLDER_IMG = "https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=600&auto=format&fit=crop"; // Ảnh lỗi thay thế

        let ALL_ARTICLES = [];
        let currentCategory = 'all';

        // Hàm khởi chạy hệ thống
        window.onload = async function() {
            await fetchArticles();
            checkDeepLink();
        };

        // Hàm gọi dữ liệu từ API Sheets[cite: 1]
        async function fetchArticles() {
            try {
                const response = await fetch(SHEETS_API);
                const rawData = await response.json();
                
                // Chuẩn hóa dữ liệu và tạo Slug định danh từ tiêu đề
                ALL_ARTICLES = rawData.map(item => ({
                    ...item,
                    slug: slugify(item.title || ''),
                    tag: (item.tag || 'thi-truong').trim().toLowerCase(),
                    type: (item.type || 'news').trim().toLowerCase()
                }));

                renderTicker();
                renderPage();
            } catch (error) {
                console.error("Lỗi kết nối API:", error);
                document.getElementById('articleGrid').innerHTML = `<p style="color:red; text-align:center; width:100%;">Không thể tải dữ liệu tin tức. Vui lòng thử lại sau!</p>`;
            }
        }

        // Tạo chuỗi liên kết Slug chuẩn không dấu
        function slugify(text) {
            return text.toString().toLowerCase().trim()
                .replace(/\s+/g, '-')
                .replace(/[áàảãạăắằẳẵặâấầẩẫậ]/g, 'a')
                .replace(/[éèẻẽẹêếềểễệ]/g, 'e')
                .replace(/[iíìỉĩị]/g, 'i')
                .replace(/[óòỏõọôốồổỗộơớờởỡợ]/g, 'o')
                .replace(/[úùủũụưứừửữự]/g, 'u')
                .replace(/[ýỳỷỹỵ]/g, 'y')
                .replace(/đ/g, 'd')
                .replace(/[^\w\-]+/g, '')
                .replace(/\-\-+/g, '-');
        }

        // Trình diễn thanh chạy chữ động (Lấy 5 bài mới nhất)
        function renderTicker() {
            const tickerWrap = document.getElementById('tickerWrap');
            const newsOnly = ALL_ARTICLES.filter(a => a.type !== 'case');
            const latest = newsOnly.slice(0, 5);
            
            if(latest.length === 0) return;
            
            let htmlContent = '';
            // Nhân bản chuỗi lặp 2 lần để chạy không điểm đứt
            for (let i = 0; i < 2; i++) {
                latest.forEach(art => {
                    htmlContent += `<div class="ticker-item" onclick="openModal('${art.slug}')">🔥 ${art.title}</div>`;
                });
            }
            tickerWrap.innerHTML = htmlContent;
        }

        // Điều phối hiển thị dựa theo danh mục (Tab) người dùng chọn[cite: 1]
        function renderPage() {
            const featuredSection = document.getElementById('featuredSection');
            const sectionTitle = document.getElementById('sectionTitle');
            const gridContainer = document.getElementById('articleGrid');

            // Lọc dữ liệu danh mục[cite: 1]
            let filtered = [];
            if (currentCategory === 'all') {
                filtered = ALL_ARTICLES.filter(a => a.type !== 'case'); // Ẩn mục case khỏi trang chủ[cite: 1]
                featuredSection.style.display = 'grid';
                sectionTitle.innerText = "Tin tức mới cập nhật";
            } else if (currentCategory === 'case') {
                filtered = ALL_ARTICLES.filter(a => a.type === 'case'); // Chỉ hiện bài viết dạng Case Study[cite: 1]
                featuredSection.style.display = 'none';
                sectionTitle.innerText = "📚 Tuyển tập Case Study chuyên sâu";
            } else {
                filtered = ALL_ARTICLES.filter(a => a.tag === currentCategory && a.type !== 'case'); // Lọc theo tag[cite: 1]
                featuredSection.style.display = 'none';
                sectionTitle.innerText = `Chủ đề: ${document.getElementById('tab-' + currentCategory).innerText}`;
            }

            // Nếu không có bài viết nào
            if(filtered.length === 0) {
                gridContainer.innerHTML = `<p style="text-align:center; width:100%; color:#777; font-style:italic; padding: 40px 0;">Hiện chưa có dữ liệu bài viết nào trong danh mục này.</p>`;
                if(currentCategory === 'all') featuredSection.style.display = 'none';
                return;
            }

            // Render khu vực Trang chủ (Hero + Side)[cite: 1]
            if (currentCategory === 'all') {
                const heroData = filtered[0];[cite: 1]
                const sideData = filtered.slice(1, 4);[cite: 1]
                const gridData = filtered.slice(4);[cite: 1]

                // Hero Render[cite: 1]
                document.getElementById('heroPostContainer').innerHTML = `
                    <div class="hero-post" onclick="openModal('${heroData.slug}')">
                        <img src="${heroData.image || PLACEHOLDER_IMG}" onerror="this.src='${PLACEHOLDER_IMG}'">
                        <span class="badge badge-${heroData.tag}">${heroData.tag}</span>
                        <h2 class="hero-title">${heroData.title}</h2>
                        <p class="hero-excerpt">${heroData.excerpt || 'Đọc phân tích chuyên sâu về thương vụ này trên Sandbox News...'}</p>
                        <div class="meta-date">${formatDate(heroData.pubDate)}</div>
                    </div>
                `;

                // Side Render[cite: 1]
                let sideHtml = '';
                sideData.forEach(art => {
                    sideHtml += `
                        <div class="side-item" onclick="openModal('${art.slug}')">
                            <img src="${art.image || PLACEHOLDER_IMG}" onerror="this.src='${PLACEHOLDER_IMG}'">
                            <div>
                                <span class="badge badge-${art.tag}" style="font-size:0.6rem; margin-bottom:3px;">${art.tag}</span>
                                <h4 class="side-item-title">${art.title}</h4>
                                <div class="meta-date" style="margin-top:4px;">${formatDate(art.pubDate)}</div>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('sidePostsContainer').innerHTML = sideHtml || '<p style="color:#777;">Chưa có bài viết phổ biến.</p>';

                // Grid Render[cite: 1]
                renderGridItems(gridData);
            } else {
                // Khung danh mục riêng biệt: Đẩy toàn bộ dữ liệu vào Grid
                renderGridItems(filtered);
            }
        }

        // Render các Block phần tử lưới
        function renderGridItems(items) {
            const gridContainer = document.getElementById('articleGrid');
            let html = '';
            items.forEach(art => {
                const currentBadge = art.type === 'case' ? 'badge-case' : `badge-${art.tag}`;
                const label = art.type === 'case' ? 'CASE STUDY' : art.tag;
                html += `
                    <div class="grid-item" onclick="openModal('${art.slug}')">
                        <img src="${art.image || PLACEHOLDER_IMG}" onerror="this.src='${PLACEHOLDER_IMG}'">
                        <span class="badge ${currentBadge}">${label}</span>
                        <div class="meta-date">${formatDate(art.pubDate)}</div>
                        <h4 class="grid-title">${art.title}</h4>
                        <p class="grid-excerpt">${art.excerpt || 'Bấm vào để xem nội dung tổng hợp phân tích chi tiết của bài viết.'}</p>
                    </div>
                `;
            });
            gridContainer.innerHTML = html;
        }

        // Chuyển đổi tab danh mục
        function changeCategory(catId) {
            currentCategory = catId;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + catId).classList.add('active');
            
            // Xóa tham số bài viết khỏi URL khi chuyển tab tránh hiểu nhầm
            const url = new URL(window.location);
            url.searchParams.delete('article');
            window.history.pushState({}, '', url);

            renderPage();
        }

        // Hàm mở cửa sổ Modal chi tiết bài viết[cite: 1]
        function openModal(slug) {
            const article = ALL_ARTICLES.find(a => a.slug === slug);
            if (!article) return;

            // Cập nhật tham số trên URL giúp kích hoạt Deep Linking
            const url = new URL(window.location);
            url.searchParams.set('article', slug);
            window.history.pushState({}, '', url);
            document.title = `${article.title} | Sandbox News`;

            // Phân tách cấu trúc nội dung từ Markdown
            let htmlContent = markdownToHtml(article.content || '');

            // CHÈN TỰ ĐỘNG TRÍCH NGUỒN (ĐẢM BẢO BẢN QUYỀN NHƯ Ý BẠN)
            if (article.source_url) {
                const name = article.source_name || "Nguồn gốc";
                htmlContent += `
                    <div style="margin-top: 35px; padding-top: 15px; border-top: 1px dashed var(--border); font-style: italic; color: #555; font-size: 0.95rem;">
                        Trích nguồn bài gốc tại: <a href="${article.source_url}" target="_blank" rel="noopener noreferrer" style="color: var(--gold); text-decoration: underline; font-weight:500;">${name}</a> / Phân tích & Biên tập lại bởi hệ thống AI-Agent Sandbox News.
                    </div>
                `;
            }

            // Cấu hình nhãn Badge cho Modal
            const badgeClass = article.type === 'case' ? 'badge-case' : `badge-${article.tag}`;
            const badgeLabel = article.type === 'case' ? 'CASE STUDY' : article.tag.toUpperCase();
            document.getElementById('modalBadge').className = `badge ${badgeClass}`;
            document.getElementById('modalBadge').innerText = badgeLabel;

            document.getElementById('modalTitle').innerText = article.title;
            document.getElementById('modalDate').innerText = formatDate(article.pubDate);
            document.getElementById('modalContent').innerHTML = htmlContent;

            // Xử lý ảnh bài viết
            const modalImg = document.getElementById('modalImage');
            if (article.image) {
                modalImg.src = article.image;
                modalImg.style.display = 'block';
                modalImg.onerror = function() { this.style.display = 'none'; };
            } else {
                modalImg.style.display = 'none';
            }

            // BÓC TÁCH VÀ RENDER PHẦN BÌNH LUẬN GIẢ LẬP TỪ AI-AGENT[cite: 1]
            const commentBox = document.getElementById('modalComments');
            commentBox.innerHTML = ''; // Reset khung cũ
            
            let commentList = [];
            if (article.comments) {
                try {
                    // Giải nén text JSON trong Sheets trở lại thành Mảng dữ liệu[cite: 1]
                    commentList = typeof article.comments === 'string' ? JSON.parse(article.comments) : article.comments;
                } catch(e) {
                    console.warn("Dữ liệu comment chưa phải cấu trúc mảng AI Object, chuyển định dạng thô.");
                }
            }

            if (commentList && commentList.length > 0) {
                let commentsHtml = `
                    <h4 style="margin-top: 40px; margin-bottom: 20px; font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; border-bottom: 2px solid var(--ink); padding-bottom: 5px; text-transform: uppercase;">
                        Thảo luận bàn tròn (${commentList.length})
                    </h4>
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                `;
                
                commentList.forEach(cmt => {
                    commentsHtml += `
                        <div style="background: #edeae0; padding: 15px; border-left: 4px solid var(--gold); border-radius: 0 4px 4px 0;">
                            <strong style="display: block; color: var(--ink); margin-bottom: 4px; font-size: 0.95rem;">${cmt.author}</strong>
                            <p style="margin: 0; color: #333; font-size: 0.9rem; line-height: 1.5; text-align: left;">${cmt.text}</p>
                        </div>
                    `;
                });
                commentsHtml += `</div>`;
                commentBox.innerHTML = commentsHtml;
            } else {
                commentBox.innerHTML = `
                    <h4 style="margin-top: 40px; margin-bottom: 15px; font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 5px; color:#666;">Thảo luận bàn tròn</h4>
                    <p style="color:#777; font-style:italic; font-size:0.9rem;">Hệ thống chưa ghi nhận lượt thảo luận chuyên sâu nào cho thương vụ này.</p>
                `;
            }

            // Hiển thị khung Modal
            document.getElementById('articleModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Đóng cửa sổ Modal
        function closeModal() {
            document.getElementById('articleModal').classList.remove('active');
            document.body.style.overflow = 'auto';
            document.title = "Sandbox News — Tạp chí Phân tích Tài chính & Doanh nghiệp";

            // Xóa chuỗi query trên link để trả lại URL sạch
            const url = new URL(window.location);
            url.searchParams.delete('article');
            window.history.pushState({}, '', url);
        }

        // Kiểm tra Deep Link (?article=slug) khi mở trang
        function checkDeepLink() {
            const params = new URLSearchParams(window.location.search);
            const articleSlug = params.get('article');
            if (articleSlug) {
                openModal(articleSlug);
            }
        }

        // Định dạng ngày tháng
        function formatDate(dateStr) {
            if(!dateStr) return '';
            try {
                const d = new Date(dateStr);
                if(isNaN(d.getTime())) return dateStr;
                return d.toLocaleDateString('vi-VN', {year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute:'2-digit'});
            } catch(e) { return dateStr; }
        }

        // Thuật toán chuyển đổi text Markdown thô sang cấu trúc HTML
        function markdownToHtml(markdown) {
            return markdown
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/### (.*?)\n/g, '<h3>$1</h3>')
                .replace(/- (.*?)\n/g, '<li>$1</li>')
                .split('\n\n').map(p => {
                    if(p.trim().startsWith('<h3') || p.trim().startsWith('<li')) return p;
                    return p.trim() ? `<p>${p}</p>` : '';
                }).join('');
        }
    </script>
</body>
